name: docker-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'packages/**'
      - 'apps/**'
      - 'pnpm-lock.yaml'
      - 'package.json'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        target: [web, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.target }}
          push: false
          load: true
          tags: jarvis-${{ matrix.target }}:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test ${{ matrix.target }} image
        run: |
          if [ "${{ matrix.target }}" = "worker" ]; then
            docker run --rm jarvis-worker:smoke node -e "console.log('worker smoke ok')"
          else
            echo "web smoke: image built successfully (runtime needs DB/env)"
          fi
