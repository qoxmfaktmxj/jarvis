name: legacy-body-grep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  legacy-body-grep:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grep for legacy body field access
        shell: bash
        run: |
          # Exclude the guard implementation itself and its tests — those files
          # *document* and *enforce* the ban, so they legitimately mention the
          # forbidden identifiers in comments and test-case names.
          set +e
          matches=$(grep -rnE 'wiki_sources\.body|wiki_concepts\.body' \
            --exclude-dir='guards' \
            --exclude-dir='__tests__' \
            --exclude-dir='node_modules' \
            --exclude-dir='.turbo' \
            --exclude-dir='.next' \
            --exclude-dir='dist' \
            packages/ apps/ 2>/dev/null)
          status=$?
          set -e

          if [ $status -eq 0 ] && [ -n "$matches" ]; then
            echo "::error::Legacy SQL body column access detected. Use wiki-fs Read instead."
            echo "$matches"
            exit 1
          fi

          echo "OK: no legacy body field access found."
          exit 0
