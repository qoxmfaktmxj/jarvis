name: legacy-body-grep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  legacy-body-grep:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grep for legacy body field access
        shell: bash
        run: |
          set +e
          # Exclude the guard module — it intentionally references legacy column
          # names in comments/tests to enforce they are not used elsewhere.
          matches=$(grep -rnE --exclude-dir=guards 'wiki_sources\.body|wiki_concepts\.body' packages/ apps/ 2>/dev/null)
          status=$?
          set -e

          if [ $status -eq 0 ] && [ -n "$matches" ]; then
            echo "::error::Legacy SQL body column access detected. Use wiki-fs Read instead."
            echo "$matches"
            exit 1
          fi

          echo "OK: no legacy body field access found."
          exit 0
