name: test

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jarvis -d jarvis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://jarvis:jarvis@localhost:5432/jarvis_test
      DATABASE_URL: postgres://jarvis:jarvis@localhost:5432/jarvis_test
      NODE_ENV: test
      OPENAI_API_KEY: dummy-for-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Ensure pgvector extension
        run: |
          PGPASSWORD=jarvis psql -h localhost -U jarvis -d jarvis_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      # packages/db/drizzle/는 보안 정책상 gitignored (private zip 채널로만 배포).
      # 그러나 .gitignore 추가 이전에 이미 추적 중이던 0062~0070 .sql + _journal.json이
      # 부분적으로 남아 있어 일관성이 깨진 상태(_journal은 0000부터 가리키는데 .sql은 0062~).
      # CI는 일회용 ephemeral DB이므로 drizzle 폴더를 wipe하고 schema/*.ts에서
      # full baseline(0000_*.sql)을 새로 생성해 적용한다.
      # 외부 사용자 가이드(README)와 동일하게 schema가 SoT임을 따른다.
      - name: Reset drizzle baseline (CI ephemeral)
        run: |
          rm -rf packages/db/drizzle
          mkdir -p packages/db/drizzle

      - name: Generate baseline migrations from schema
        run: pnpm db:generate

      - name: Run DB migrations
        run: |
          pnpm db:migrate 2>&1 | tee /tmp/migrate.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "=== Migration failed. Log tail ==="
            tail -50 /tmp/migrate.log
          fi
          exit $EXIT

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration

      - name: Schema drift check
        run: node scripts/check-schema-drift.mjs --ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            **/vitest.log
            **/junit*.xml
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Nightly eval job — disabled until Phase-7A Lane B (eval harness) lands.
  # Unblock by removing the `if: false` gate after `pnpm eval:run` exists.
  # -------------------------------------------------------------------------
  eval-nightly:
    if: false
    runs-on: ubuntu-latest
    needs: unit-and-integration
    # schedule trigger is defined at workflow root once Lane B lands:
    #   schedule:
    #     - cron: '0 3 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm eval:run
