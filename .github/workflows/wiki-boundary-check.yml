name: wiki-boundary-check

# -----------------------------------------------------------------------------
# Phase-W3 v4-W3-T1 — auto/manual boundary enforcement.
#
# LLM commit author pattern: `jarvis-llm@{workspaceId}` (e.g.
# `jarvis-llm@11111111-1111-1111-1111-111111111111`). Humans commit with their
# real email. Rules:
#   - LLM may only write under `wiki/auto/**`
#   - Humans may only write under `wiki/manual/**`
#
# On violation, the job fails with a `::error::` annotation and blocks the PR.
# The `paths:` filter keeps unrelated PRs from paying the cost.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
  pull_request:
    branches: [main]
    paths:
      - 'wiki/**'

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check auto/manual boundary
        shell: bash
        run: |
          set +e
          # On push events, HEAD == origin/main already — use event range instead.
          # On pull_request events, origin/main..HEAD correctly covers the PR commits.
          if [ "${{ github.event_name }}" = "push" ]; then
            GIT_RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            GIT_RANGE="origin/main..HEAD"
          fi
          # LLM author touched wiki/manual/**?
          llm_manual=$(git log --format="%ae %s" "$GIT_RANGE" -- 'wiki/manual/**' 2>/dev/null | grep -E '^jarvis-llm@' || true)
          # Human author touched wiki/auto/**?
          human_auto=$(git log --format="%ae %s" "$GIT_RANGE" -- 'wiki/auto/**' 2>/dev/null | grep -vE '^jarvis-llm@' | grep -vE '^$' || true)
          set -e

          violation=0

          if [ -n "$llm_manual" ]; then
            echo "::error::LLM author wrote to wiki/manual/**:"
            echo "$llm_manual"
            violation=1
          fi

          if [ -n "$human_auto" ]; then
            echo "::error::Human author wrote to wiki/auto/**:"
            echo "$human_auto"
            violation=1
          fi

          if [ $violation -eq 0 ]; then
            echo "OK: wiki auto/manual boundary intact."
          fi

          exit $violation
