name: wiki-boundary-check

# -----------------------------------------------------------------------------
# Phase-W3 G9 placeholder. The boundary-check step is gated behind `if: false`
# until `scripts/wiki-boundary.mjs` lands. Remove the `if: false` in Phase-W3
# 활성화 시점에 제거하고 스크립트를 실행하도록 전환한다.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  wiki-boundary-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Phase-W3에서 if: false 제거 후 활성화
      - name: Wiki boundary check
        if: false
        run: node scripts/wiki-boundary.mjs --ci
