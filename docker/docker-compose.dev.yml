# docker/docker-compose.dev.yml — DEVELOPMENT OVERRIDE
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d postgres redis minio
# Next.js runs outside Docker (pnpm dev) for hot reload
#
# Dev secrets: placeholder files are created by scripts/setup-dev.sh
# (docker/secrets/*.txt is gitignored — never commit real secrets)

services:
  postgres:
    ports:
      - "127.0.0.1:5436:5432"
    # Override: use POSTGRES_PASSWORD directly so secret file content doesn't matter
    environment:
      POSTGRES_PASSWORD_FILE: ""
      POSTGRES_PASSWORD: ${PG_PASSWORD:-jarvispass}

  redis:
    ports:
      - "127.0.0.1:6380:6379"

  minio:
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    # Override: use direct env vars so secret file content doesn't matter
    environment:
      MINIO_ROOT_USER_FILE: ""
      MINIO_ROOT_PASSWORD_FILE: ""
      MINIO_ROOT_USER: ${MINIO_USER:-jarvisadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-jarvispassword}

  # Keycloak — local OIDC provider for dev only
  # In production, use external Keycloak URL in OIDC_ISSUER env var
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: jarvis-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:18080:8080"
    restart: unless-stopped

  # web + worker: run via pnpm dev outside Docker for hot reload
  # Only start nginx if explicitly needed: docker compose ... --profile nginx up nginx
  web:
    profiles: ["docker-dev"]

  worker:
    profiles: ["docker-dev"]

  nginx:
    profiles: ["nginx"]
