# docker/docker-compose.yml — PRODUCTION
# Services communicate via internal Docker network (no host port exposure for DB/MinIO)
# Only Nginx exposes 80/443 externally
# Run: docker compose -f docker/docker-compose.yml up -d

networks:
  jarvis-network:
    driver: bridge

volumes:
  pgdata:
  miniodata:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    restart: unless-stopped
    networks: [jarvis-network]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: jarvis-minio
    restart: unless-stopped
    networks: [jarvis-network]
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    secrets: [minio_user, minio_password]
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cli-proxy:
    # Phase-W1.5 Subscription Gateway. See infra/cliproxy/README.md.
    # Pinned tag — CLIProxyAPI is rolling-release; never use :latest.
    image: eceasy/cli-proxy-api:v6.9.29
    container_name: jarvis-cli-proxy
    restart: unless-stopped
    networks: [jarvis-network]
    ports:
      # Localhost-only bind: prevents public exposure. Internal Jarvis services
      # reach cli-proxy via compose network (http://cli-proxy:8317). Host bind
      # is only for dev smoke tests (curl from user machine).
      - "127.0.0.1:8317:8317"
    volumes:
      - ../infra/cliproxy/config.yaml:/CLIProxyAPI/config.yaml:ro
      - ../infra/cliproxy/auths:/root/.cli-proxy-api:rw
      - ../infra/cliproxy/logs:/CLIProxyAPI/logs
    healthcheck:
      # NOTE: ${LLM_GATEWAY_KEY} must be set in the host env (or .env file used
      # by docker compose). Empty/missing key intentionally fails the healthcheck
      # so that misconfiguration is loud rather than silent. Sentinel values like
      # "sk-jarvis-local-dev" are rejected by apps/web/lib/env.ts in production.
      test: ["CMD-SHELL", "wget -qO- --header=\"Authorization: Bearer ${LLM_GATEWAY_KEY}\" http://127.0.0.1:8317/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: jarvis-web:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: jarvis-web
    restart: unless-stopped
    networks: [jarvis-network]
    environment:
      NODE_ENV: production
      # DATABASE_URL is constructed by entrypoint.sh from pg_password secret
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: jarvis-files
      APP_URL: ${APP_URL:-http://localhost}
      # Phase-W1.5 — gateway URL is internal compose DNS.
      LLM_GATEWAY_URL: http://cli-proxy:8317/v1
      LLM_GATEWAY_KEY: ${LLM_GATEWAY_KEY}
      FEATURE_SUBSCRIPTION_INGEST: ${FEATURE_SUBSCRIPTION_INGEST:-false}
      FEATURE_SUBSCRIPTION_QUERY: ${FEATURE_SUBSCRIPTION_QUERY:-false}
      FEATURE_SUBSCRIPTION_LINT: ${FEATURE_SUBSCRIPTION_LINT:-false}
    # entrypoint.sh reads these secret files and exports as env vars:
    #   pg_password     → DATABASE_URL
    #   session_secret  → SESSION_SECRET
    #   openai_api_key  → OPENAI_API_KEY
    #   minio_user      → MINIO_ACCESS_KEY
    #   minio_password  → MINIO_SECRET_KEY
    secrets: [pg_password, session_secret, openai_api_key, minio_user, minio_password]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      cli-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    image: jarvis-worker:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: jarvis-worker
    restart: unless-stopped
    networks: [jarvis-network]
    environment:
      NODE_ENV: production
      # DATABASE_URL is constructed by entrypoint.sh from pg_password secret
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: jarvis-files
      # Phase-W1.5 — gateway URL is internal compose DNS.
      LLM_GATEWAY_URL: http://cli-proxy:8317/v1
      LLM_GATEWAY_KEY: ${LLM_GATEWAY_KEY}
      FEATURE_SUBSCRIPTION_INGEST: ${FEATURE_SUBSCRIPTION_INGEST:-false}
      FEATURE_SUBSCRIPTION_LINT: ${FEATURE_SUBSCRIPTION_LINT:-false}
    # entrypoint.sh reads these secret files and exports as env vars:
    #   pg_password      → DATABASE_URL
    #   openai_api_key   → OPENAI_API_KEY
    #   minio_user       → MINIO_ACCESS_KEY
    #   minio_password   → MINIO_SECRET_KEY
    secrets: [pg_password, openai_api_key, minio_user, minio_password]
    depends_on:
      postgres:
        condition: service_healthy
      cli-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    container_name: jarvis-nginx
    restart: unless-stopped
    networks: [jarvis-network]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  minio_user:
    file: ./secrets/minio_user.txt
  minio_password:
    file: ./secrets/minio_password.txt
  session_secret:
    file: ./secrets/session_secret.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
