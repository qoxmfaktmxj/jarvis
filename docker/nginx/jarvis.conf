# Jarvis — Nginx reverse proxy
# 인터넷 노출: 80(redirect), 443(HTTPS)
# 내부 프록시: 127.0.0.1:3010 (Next.js)

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name career.minseok91.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name career.minseok91.cloud;

    ssl_certificate     /etc/letsencrypt/live/career.minseok91.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/career.minseok91.cloud/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 보안 헤더
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # Next.js 앱 프록시
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Ask AI SSE — 스트리밍은 버퍼링 끄기
    location /api/ask {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
